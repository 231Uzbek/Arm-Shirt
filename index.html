<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndShirt — Официальный магазин</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">AndShirt</div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="#home">Главная</a></li>
                    <li><a href="#catalog">Каталог</a></li>
                    <li><a href="#about">О нас</a></li>
                    <li><a href="#order">Заказать</a></li>
                </ul>
            </nav>
           <div class="product-card">
    <div class="product-image-box">
        <img src="ссылка_на_твое_фото" alt="Товар">
    </div>
    <h3>Название</h3>
    <p>Цена</p>
    <button class="buy-btn">В корзину</button>
</div>

    <section id="home" class="hero">
        <h1>AndShirt</h1>
        <p>Стиль, который говорит за тебя</p>
   <main class="catalog">
    <div class="product-card">
        <div class="product-image-box">
            <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=300&q=80" alt="Футболка">
        </div>
        <h3>Базовая футболка</h3>
        <p>1 500 ₽</p>
        <button class="buy-btn">В корзину</button>
    </div>

    <div class="product-card">
        <div class="product-image-box">
            <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=300&q=80" alt="Худи">
        </div>
        <h3>Худи Premium</h3>
        <p>3 500 ₽</p>
        <button class="buy-btn">В корзину</button>
    </div>

    <div class="product-card">
        <div class="product-image-box">
            <img src="https://images.unsplash.com/photo-1552346154-21d32810aba3?auto=format&fit=crop&w=300&q=80" alt="Джоггеры">
        </div>
        <h3>Джоггеры Black</h3>
        <p>2 800 ₽</p>
        <button class="buy-btn">В корзину</button>
    </div>

    <div class="product-card">
        <div class="product-image-box">
            <img src="https://images.unsplash.com/photo-1588850561407-ed78c282e89b?auto=format&fit=crop&w=300&q=80" alt="Кепка">
        </div>
        <h3>Кепка AndShirt</h3>
        <p>1 200 ₽</p>
        <button class="buy-btn">В корзину</button>
    </div>
</main>

    <section id="order" class="container">
        <h2 class="section-title">Оформить заказ</h2>
        <form class="order-form" id="orderForm">
            <input type="text" id="name" placeholder="Ваше имя" required>
            <input type="tel" id="phone" placeholder="Ваш телефон" required>
            <button type="submit" class="order-btn">Отправить заявку</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
